name: Daily Data Pipeline

on:
  workflow_dispatch:
    inputs:
      start_date:
        description: "Optional YYYY-MM-DD backfill start date"
        required: false
        type: string
      end_date:
        description: "Optional YYYY-MM-DD backfill end date"
        required: false
        type: string
      run_preprocessing:
        description: "Run data-analysis 01 preprocessing"
        required: false
        default: true
        type: boolean
  schedule:
    # 03:00 KST daily
    - cron: "0 18 * * *"
    # 07:00 KST daily retry for late source uploads
    - cron: "0 22 * * *"

permissions:
  contents: write

concurrency:
  group: daily-data-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pandas numpy requests ipython xlrd openpyxl lxml

      - name: Run collection and preprocessing pipeline
        env:
          BOK_ECOS_API_KEY: ${{ secrets.BOK_ECOS_API_KEY }}
          GEOCODER_TOKEN: ${{ secrets.GEOCODER_TOKEN }}
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          NAVER_MAPS_CLIENT_ID: ${{ secrets.NAVER_MAPS_CLIENT_ID }}
          NAVER_MAPS_CLIENT_SECRET: ${{ secrets.NAVER_MAPS_CLIENT_SECRET }}
          VWORLD_API_KEY: ${{ secrets.VWORLD_API_KEY }}
          KFF_RUN_STATION_DOWNLOAD: "false"
          KFF_RUN_FACILITY: "false"
          KFF_RUN_METADATA_GEOCODE: "false"
          KFF_RUN_LAND_PRICE: "false"
        run: |
          args=(
            --repo-root .
            --build-page
            --include-ai-placeholders
          )
          if [ -n "${{ inputs.start_date }}" ]; then
            args+=(--start-date "${{ inputs.start_date }}")
          fi
          if [ -n "${{ inputs.end_date }}" ]; then
            args+=(--end-date "${{ inputs.end_date }}")
          fi
          if [ "${{ inputs.run_preprocessing }}" != "false" ]; then
            args+=(--run-preprocessing)
          fi
          python automation/daily_pipeline.py "${args[@]}"

      - name: Commit pipeline outputs
        run: |
          if git diff --quiet -- \
            automation/logs \
            data-analysis/00_data_collection/outputs \
            data-analysis/01_data_preprocessing/outputs \
            page/manual_inputs \
            page/public/data/latest; then
            echo "No pipeline changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            automation/logs \
            data-analysis/00_data_collection/outputs \
            data-analysis/01_data_preprocessing/outputs \
            page/manual_inputs \
            page/public/data/latest
          git commit -m "Run daily data pipeline"
          git pull --rebase origin main
          git push
